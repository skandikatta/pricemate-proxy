name: Scrape Coles

on:
  schedule:
    - cron: "0 19 * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install pg
      - name: Wake Render proxy
        run: |
          for i in 1 2 3; do
            curl -s -m 120 "https://pricemate-proxy.onrender.com/health" && break
            echo "Attempt $i failed, waiting 30s..."
            sleep 30
          done
      - run: node scrape-coles.js
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
