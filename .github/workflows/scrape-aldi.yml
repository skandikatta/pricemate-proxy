name: Scrape Aldi

on:
  schedule:
    - cron: "0 20 * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install pg
      - run: node scrape-aldi.js
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          OPTION_C_SHADOW_WRITE: "1"
      - name: Check for warnings
        if: always()
        run: echo "Scraper exited with code $? — check logs for WARNING lines"
