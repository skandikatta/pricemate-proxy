name: Scrape Priceline
on:
  schedule:
    - cron: '30 20 * * *'  # 6:30am AEST daily
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - name: Scrape Priceline
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          OPTION_C_SHADOW_WRITE: "1"
        run: node scrape-priceline.js
