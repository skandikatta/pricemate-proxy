name: Send sale alerts

# Runs 90 min after the latest scrape finishes (Coles=19:00, Woolies=19:00,
# Aldi=19:30 UTC). 21:00 UTC ≈ 7:00 AEST — alerts land before users start
# checking phones for the day.

on:
  schedule:
    - cron: "0 21 * * *"
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Self-contained: send-alerts.js has the HTML template inlined, no .tsx
      # template imports, no cross-repo checkout. Two deps only.
      - name: Install deps
        run: npm install pg resend

      - name: Send alerts
        run: node send-alerts.js
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
          FROM_ADDRESS: ${{ secrets.FROM_ADDRESS }}
          REPLY_TO_ADDRESS: ${{ secrets.REPLY_TO_ADDRESS }}
