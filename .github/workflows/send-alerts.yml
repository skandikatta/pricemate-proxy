name: Send sale alerts

# Triggers after Scrape Woolworths completes — Woolies is the slowest of the
# three (~1h43m) so by the time it finishes, Coles + Aldi are also done.
# Eliminates the "alerts fired before Aldi's late re-run" race that surfaced
# 2026-05-28 when Aldi got pushed to 22:50 UTC by GH queue jitter.
#
# Fallback cron at 23:00 UTC fires if Woolworths run never completes (catches
# the case where Woolies workflow gets cancelled/never starts).
#
# send-alerts.js has internal dedup (skipped_dedup counter) so double-firing
# does NOT produce duplicate user emails — it just costs a few extra seconds.

on:
  workflow_run:
    workflows: ["Scrape Woolworths"]
    types: [completed]
  schedule:
    - cron: "0 23 * * *"
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # When triggered by workflow_run, only proceed if the parent scrape finished
    # (success OR failure — partial data is still better than no data). When
    # triggered by cron / manual, always run.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Self-contained: send-alerts.js has the HTML template inlined, no .tsx
      # template imports, no cross-repo checkout. Two deps only.
      - name: Install deps
        run: npm install pg resend

      - name: Send alerts
        run: node send-alerts.js
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
          FROM_ADDRESS: ${{ secrets.FROM_ADDRESS }}
          REPLY_TO_ADDRESS: ${{ secrets.REPLY_TO_ADDRESS }}
