name: Aldi Health Check

on:
  schedule:
    # Mon + Thu 08:00 UTC = 18:00 / 19:00 AEST. Well before the 20:00 UTC
    # Aldi scrape so any auto-fix lands before the next scheduled run.
    - cron: "0 8 * * 1,4"
  workflow_dispatch:

permissions:
  contents: write   # auto-commit category drift fixes
  actions: write    # gh workflow run scrape-aldi.yml
  issues: write     # open an issue when extraction breaks

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run health-check
        id: check
        run: node scripts/aldi-health-check.js

      - name: Open issue if extraction broke
        if: steps.check.outputs.extraction_broken == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "Aldi extraction broken — extractProducts() returned 0 products" \
            --body "Health check detected zero products from a live Aldi category page (\`${{ steps.check.outputs.test_url }}\`). The per-tile regex anchors in \`extract-aldi.js\` Strategy 1 likely need updating. Strategies 2-4 may also be stale. No auto-fix was applied. See run logs for details."

      - name: Commit + push + trigger scrape
        if: steps.check.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scrape-aldi.js
          MSG=""
          if [ -n "${{ steps.check.outputs.adds }}" ];        then MSG="${MSG}adds: ${{ steps.check.outputs.adds }}"$'\n'; fi
          if [ -n "${{ steps.check.outputs.id_changes }}" ];  then MSG="${MSG}id changes: ${{ steps.check.outputs.id_changes }}"$'\n'; fi
          if [ -n "${{ steps.check.outputs.removes }}" ];     then MSG="${MSG}removes → SKIP: ${{ steps.check.outputs.removes }}"$'\n'; fi
          git commit -m "chore(aldi): auto-update categories [health-check]" -m "${MSG}"
          git push
          gh workflow run scrape-aldi.yml
          echo "Triggered scrape-aldi.yml with updated categories"
