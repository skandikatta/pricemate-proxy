name: Daily Scrape

on:
  schedule:
    - cron: "0 19 * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Wake up Render
        run: curl -s -m 120 "https://pricemate-proxy.onrender.com/health" && echo " OK"
      - name: Wait for ready
        run: sleep 5
      - name: Scrape all stores
        run: |
          result=$(curl -s -m 900 "https://pricemate-proxy.onrender.com/api/scrape-all")
          echo "$result"
          echo "$result" | grep -q "success" || exit 0
