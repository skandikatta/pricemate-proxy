name: Daily Scrape

on:
  schedule:
    - cron: "0 19 * * *"
  workflow_dispatch:

jobs:
  wake-proxy:
    runs-on: ubuntu-latest
    steps:
      - name: Wake Render proxy
        run: |
          curl -s -m 120 "https://pricemate-proxy.onrender.com/health" && echo " OK"
          sleep 5

  coles:
    needs: wake-proxy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: node scrape-coles.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

  woolworths:
    needs: wake-proxy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: node scrape-woolworths.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
